#!name=FreePhone 去广告
#!desc=屏蔽 FreePhone 抓包中出现的 AdMob 广告、Facebook 统计和 Microsoft Clarity 上报；不修改积分、订阅、购买或号码接口。
#!category=AdBlock
#!author=Codex

[Rule]
# Google AdMob / Google Ads
DOMAIN, googleads.g.doubleclick-cn.net, REJECT
DOMAIN, pagead2.googlesyndication-cn.com, REJECT
DOMAIN, pagead2.googleadservices-cn.com, REJECT

# Facebook SDK telemetry
DOMAIN, ep2.facebook.com, REJECT

# Microsoft Clarity telemetry
DOMAIN, p.clarity.ms, REJECT
DOMAIN, www.clarity.ms, REJECT

[Script]
FreePhone_安全审计 = type=http-response, pattern=^https:\/\/freephone\.io\/api\/v1\/, requires-body=1, max-size=2097152, script-path=https://raw.githubusercontent.com/yjlsx/qx/main/rewrite/freephone_audit.js

[MITM]
hostname = %APPEND% freephone.io, googleads.g.doubleclick-cn.net, pagead2.googlesyndication-cn.com, pagead2.googleadservices-cn.com, ep2.facebook.com, p.clarity.ms, www.clarity.ms
